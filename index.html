<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방탈출</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="noise-canvas"></canvas>
    <div class="scanlines"></div>
    <div id="timer-display">60:00</div>
    
    <div class="hint-section">
        <h2>힌트 / 정답 조회</h2>
        <input type="text" id="qNumber" placeholder="문제 번호를 입력하세요">
        <button id="btn-hint">확인</button>
        <div id="hint-result"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let timerState = { remainingSeconds: 3600, isRunning: false, lastUpdateTime: null };
        const timerDisplay = document.getElementById('timer-display');
        
        socket.on('timer_update', (state) => {
            timerState = state;
            updateDisplay();
        });

        let lastAppliedPhase = null;
        const noiseCanvas = document.getElementById('noise-canvas');

        function updateBackground(currentRemaining) {
            const minutes = currentRemaining / 60;
            let phase = 1;

            if (minutes >= 30) {
                phase = 1;
            } else if (minutes >= 20) {
                phase = 2;
            } else if (minutes >= 10) {
                phase = 3;
            } else {
                phase = 4;
            }

            if (phase !== lastAppliedPhase) {
                lastAppliedPhase = phase;
                document.body.className = `theme-phase${phase}`;
                
                if (noiseCanvas) {
                    if (phase === 1) noiseCanvas.style.opacity = '0.02';
                    else if (phase === 2) noiseCanvas.style.opacity = '0.05';
                    else if (phase === 3) noiseCanvas.style.opacity = '0.10';
                    else if (phase === 4) noiseCanvas.style.opacity = '0.20';
                }
            }
        }

        function updateDisplay() {
            let currentRemaining = timerState.remainingSeconds;
            
            if (timerState.isRunning && timerState.lastUpdateTime) {
                const elapsed = Math.floor((Date.now() - timerState.lastUpdateTime) / 1000);
                currentRemaining = Math.max(0, currentRemaining - elapsed);
            }
            
            updateBackground(currentRemaining);
            
            const minutes = Math.floor(currentRemaining / 60).toString().padStart(2, '0');
            const seconds = (currentRemaining % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${minutes}:${seconds}`;
        }

        // Update timer every second
        setInterval(updateDisplay, 1000);

        // Hint Logic
        const btnHint = document.getElementById('btn-hint');
        const inputQNumber = document.getElementById('qNumber');
        const resultDiv = document.getElementById('hint-result');

        // Reset result when input changes
        inputQNumber.addEventListener('input', () => {
            resultDiv.innerHTML = '';
        });

        btnHint.addEventListener('click', async () => {
            const qNumber = inputQNumber.value.trim();
            if (!qNumber) return;

            try {
                const res = await fetch('/api/hint', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qNumber })
                });
                const data = await res.json();
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div style="margin-bottom: 15px;">
                            <strong>힌트:</strong> ${data.hint || '-'}
                        </div>
                        <button id="btn-show-answer" style="background-color: #ff9800; font-size: 0.9rem; padding: 6px 12px;">정답 보기</button>
                        <div id="answer-box" style="margin-top: 15px; display: none;">
                            <strong>정답:</strong> ${data.answer || '-'}
                        </div>
                    `;

                    // Add listener to show the answer
                    document.getElementById('btn-show-answer').addEventListener('click', function() {
                        document.getElementById('answer-box').style.display = 'block';
                        this.style.display = 'none'; // Hide "Show Answer" button
                    });
                } else {
                    resultDiv.innerHTML = `<span style="color: #ffaaaa;">${data.message}</span>`;
                }
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = `<span style="color: #ffaaaa;">오류가 발생했습니다.</span>`;
            }
        });

        // Noise Canvas Generator
        const canvas = document.getElementById('noise-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth / 2; // Downscaled for performance
            canvas.height = window.innerHeight / 2;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function generateNoise() {
            const width = canvas.width;
            const height = canvas.height;
            if (width === 0 || height === 0) return;
            
            const imgData = ctx.createImageData(width, height);
            const data = imgData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const val = Math.floor(Math.random() * 255);
                data[i] = val;
                data[i+1] = val;
                data[i+2] = val;
                data[i+3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        let lastNoiseTime = 0;
        function renderLoop(time) {
            if (time - lastNoiseTime > 40) { // ~25 fps
                generateNoise();
                lastNoiseTime = time;
            }
            requestAnimationFrame(renderLoop);
        }
        requestAnimationFrame(renderLoop);
    </script>
</body>
</html>
